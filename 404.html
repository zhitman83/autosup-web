<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoSup — приглашение</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #0b1220 0%, #12243b 100%);
      color: #eaf2ff; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card { max-width: 420px; text-align: center; }
    .logo { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; color: #00e5b8; }
    .title { margin-top: 20px; font-size: 22px; font-weight: 700; }
    .desc { margin-top: 12px; font-size: 15px; line-height: 1.5; color: #cdd9ea; }
    .hint { margin-top: 18px; font-size: 13px; color: #9fb3cc; line-height: 1.5; }
    .stores { margin-top: 28px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block; padding: 12px 20px; border-radius: 12px;
      background: #00e5b8; color: #06202b; font-weight: 700; text-decoration: none; font-size: 15px;
    }
    .btn.secondary { background: rgba(255,255,255,0.1); color: #eaf2ff; }
    .footer { margin-top: 36px; font-size: 12px; color: #5f7591; }
    .footer a { color: #9fb3cc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">AutoSup</div>
    <div class="title">Вас пригласили в семейный доступ</div>
    <div class="desc">
      Чтобы принять приглашение, установите приложение AutoSup и откройте эту ссылку снова.
    </div>
    <div class="hint">
      Уже установили? Откройте приложение → Профиль → Аккаунт → «Принять приглашение»
      и введите код из ссылки.
    </div>
    <div class="stores">
      <a class="btn" href="#">App Store</a>
      <a class="btn secondary" href="#">Google Play</a>
    </div>
    <div class="footer">
      <a href="/">autosup.app</a>
    </div>
  </div>
</body>
</html>
